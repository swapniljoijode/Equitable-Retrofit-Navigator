name: CI-CD

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile check
        run: python -m compileall src app

      - name: Run tests
        run: pytest -q

      - name: Build Docker image
        run: docker build -t equitable-retrofit-navigator:${{ github.sha }} .

# AWS deployment jobs intentionally disabled for non-AWS mode.
# Re-enable Terraform plan/apply jobs when AWS credentials and infra secrets are available.
